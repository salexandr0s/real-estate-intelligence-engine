name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Build and push worker-scraper image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: apps/worker-scraper/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/worker-scraper:${{ github.sha }}
            ghcr.io/${{ github.repository }}/worker-scraper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Build and push worker-processing image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: apps/worker-processing/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/worker-processing:${{ github.sha }}
            ghcr.io/${{ github.repository }}/worker-processing:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Prepare scan artifact directory
        run: mkdir -p .trivy

      - name: Generate API SARIF report
        id: report_api
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          format: sarif
          output: .trivy/api.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln

      - name: Generate worker-scraper SARIF report
        id: report_worker_scraper
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/worker-scraper:${{ github.sha }}
          format: sarif
          output: .trivy/worker-scraper.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln

      - name: Generate worker-processing SARIF report
        id: report_worker_processing
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/worker-processing:${{ github.sha }}
          format: sarif
          output: .trivy/worker-processing.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln

      - name: Upload API SARIF to code scanning
        if: always() && hashFiles('.trivy/api.sarif') != ''
        uses: github/codeql-action/upload-sarif@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e
        with:
          sarif_file: .trivy/api.sarif
          category: container-api

      - name: Upload worker-scraper SARIF to code scanning
        if: always() && hashFiles('.trivy/worker-scraper.sarif') != ''
        uses: github/codeql-action/upload-sarif@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e
        with:
          sarif_file: .trivy/worker-scraper.sarif
          category: container-worker-scraper

      - name: Upload worker-processing SARIF to code scanning
        if: always() && hashFiles('.trivy/worker-processing.sarif') != ''
        uses: github/codeql-action/upload-sarif@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e
        with:
          sarif_file: .trivy/worker-processing.sarif
          category: container-worker-processing

      - name: Enforce API vulnerability gate
        id: scan_api
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          skip-setup-trivy: true

      - name: Enforce worker-scraper vulnerability gate
        id: scan_worker_scraper
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/worker-scraper:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          skip-setup-trivy: true

      - name: Enforce worker-processing vulnerability gate
        id: scan_worker_processing
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/worker-processing:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          skip-setup-trivy: true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-scan-results
          path: .trivy/*.sarif
          retention-days: 14
          if-no-files-found: warn

      - name: Fail if any image scan reported HIGH/CRITICAL vulnerabilities
        if: always()
        run: |
          if [ "${{ steps.scan_api.outcome }}" != "success" ] || \
             [ "${{ steps.scan_worker_scraper.outcome }}" != "success" ] || \
             [ "${{ steps.scan_worker_processing.outcome }}" != "success" ]; then
            echo "One or more container scans failed."
            exit 1
          fi
