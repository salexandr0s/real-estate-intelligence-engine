name: CD

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        run: |
          docker buildx version
          docker buildx create --name immoradar-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Build and push API image
        run: |
          docker buildx build \
            --file apps/api/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/api:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/api:latest \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/api-buildcache:main \
            --cache-to type=registry,ref=ghcr.io/${{ github.repository }}/api-buildcache:main,mode=max \
            --sbom=true \
            --provenance=true \
            --push \
            .

      - name: Build and push worker-scraper image
        run: |
          docker buildx build \
            --file apps/worker-scraper/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/worker-scraper:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/worker-scraper:latest \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/worker-scraper-buildcache:main \
            --cache-to type=registry,ref=ghcr.io/${{ github.repository }}/worker-scraper-buildcache:main,mode=max \
            --sbom=true \
            --provenance=true \
            --push \
            .

      - name: Build and push worker-processing image
        run: |
          docker buildx build \
            --file apps/worker-processing/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/worker-processing:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/worker-processing:latest \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/worker-processing-buildcache:main \
            --cache-to type=registry,ref=ghcr.io/${{ github.repository }}/worker-processing-buildcache:main,mode=max \
            --sbom=true \
            --provenance=true \
            --push \
            .

      - name: Prepare scan artifact directory
        run: mkdir -p .trivy

      - name: Generate API SARIF report
        id: report_api
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          format: sarif
          output: .trivy/api.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln

      - name: Generate worker-scraper SARIF report
        id: report_worker_scraper
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/worker-scraper:${{ github.sha }}
          format: sarif
          output: .trivy/worker-scraper.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln

      - name: Generate worker-processing SARIF report
        id: report_worker_processing
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/worker-processing:${{ github.sha }}
          format: sarif
          output: .trivy/worker-processing.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln

      - name: Upload API SARIF to code scanning
        if: always() && hashFiles('.trivy/api.sarif') != ''
        uses: github/codeql-action/upload-sarif@f94817b9f0deeb3871261446912ae8f854d1b675
        with:
          sarif_file: .trivy/api.sarif
          category: container-api

      - name: Upload worker-scraper SARIF to code scanning
        if: always() && hashFiles('.trivy/worker-scraper.sarif') != ''
        uses: github/codeql-action/upload-sarif@f94817b9f0deeb3871261446912ae8f854d1b675
        with:
          sarif_file: .trivy/worker-scraper.sarif
          category: container-worker-scraper

      - name: Upload worker-processing SARIF to code scanning
        if: always() && hashFiles('.trivy/worker-processing.sarif') != ''
        uses: github/codeql-action/upload-sarif@f94817b9f0deeb3871261446912ae8f854d1b675
        with:
          sarif_file: .trivy/worker-processing.sarif
          category: container-worker-processing

      - name: Enforce API vulnerability gate
        id: scan_api
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          skip-setup-trivy: true

      - name: Enforce worker-scraper vulnerability gate
        id: scan_worker_scraper
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/worker-scraper:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          skip-setup-trivy: true

      - name: Enforce worker-processing vulnerability gate
        id: scan_worker_processing
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/worker-processing:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          skip-setup-trivy: true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: trivy-scan-results
          path: .trivy/
          retention-days: 14
          if-no-files-found: ignore

      - name: Fail if any image scan reported HIGH/CRITICAL vulnerabilities
        if: always()
        run: |
          if [ "${{ steps.scan_api.outcome }}" != "success" ] || \
             [ "${{ steps.scan_worker_scraper.outcome }}" != "success" ] || \
             [ "${{ steps.scan_worker_processing.outcome }}" != "success" ]; then
            echo "One or more container scans failed."
            exit 1
          fi
