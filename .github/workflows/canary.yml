name: Canary Crawl

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source code to canary (leave empty for all)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        source:
          - willhaben
          - immoscout24
          - wohnnet
          - derstandard
          - findmyhome
          - remax

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run canary crawl for ${{ matrix.source }}
        if: ${{ !inputs.source || inputs.source == matrix.source }}
        run: npx tsx scripts/canary-crawl.ts --source ${{ matrix.source }}
        timeout-minutes: 5
        env:
          NODE_ENV: production

      - name: Upload canary report on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: canary-${{ matrix.source }}
          path: canary-*.log
          retention-days: 14
          if-no-files-found: ignore
