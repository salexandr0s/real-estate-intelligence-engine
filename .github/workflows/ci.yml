name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: immoradar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/immoradar
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Secret scan
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Create PostgreSQL extensions
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d immoradar -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d immoradar -c "CREATE EXTENSION IF NOT EXISTS citext;"

      - name: Run migrations
        run: npm run db:migrate

      - name: Lint
        run: npx eslint "packages/*/src/**/*.ts" "apps/*/src/**/*.ts" "tests/**/*.ts" "scripts/**/*.ts"

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npx vitest run --reporter=verbose 2>&1 | tee test-output.log

      - name: Integration tests
        run: npm run test:integration -- --reporter=verbose 2>&1 | tee integration-test-output.log

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-failure-artifacts
          path: |
            **/test-results/
            **/coverage/
            **/*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-output
          path: |
            test-output.log
            integration-test-output.log
          retention-days: 7

  macos-build:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build macOS app
        run: |
          set -o pipefail
          xcodebuild build \
            -project apps/macos/ImmoRadar.xcodeproj \
            -scheme ImmoRadar \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50
