name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: real_estate_intel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/real_estate_intel
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create PostgreSQL extensions
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d real_estate_intel -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d real_estate_intel -c "CREATE EXTENSION IF NOT EXISTS citext;"

      - name: Run migrations
        run: npm run db:migrate

      - name: Build
        run: npm run build

      - name: Lint
        run: npx eslint "packages/*/src/**/*.ts" "apps/*/src/**/*.ts" "tests/**/*.ts" "scripts/**/*.ts"

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npx vitest run
