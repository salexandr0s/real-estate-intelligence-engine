name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: immoradar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/immoradar
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz$" "gitleaks_${GITLEAKS_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
          mkdir -p "$HOME/.local/bin"
          install -m 0755 gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Secret scan
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            base_ref=$(jq -r '.pull_request.base.sha' "$GITHUB_EVENT_PATH")
            head_ref=$(jq -r '.pull_request.head.sha' "$GITHUB_EVENT_PATH")
          elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            base_ref=$(jq -r '.before' "$GITHUB_EVENT_PATH")
            head_ref=$(jq -r '.after' "$GITHUB_EVENT_PATH")
          else
            base_ref=""
            head_ref=""
          fi

          if [[ -z "$base_ref" || "$base_ref" =~ ^0+$ || "$base_ref" == "$head_ref" ]]; then
            log_opts='-1'
          else
            log_opts="--no-merges --first-parent ${base_ref}^..${head_ref}"
          fi

          gitleaks detect --redact -v --exit-code=2 --log-level=debug --log-opts="$log_opts"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Create PostgreSQL extensions
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d immoradar -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d immoradar -c "CREATE EXTENSION IF NOT EXISTS citext;"

      - name: Run migrations
        run: npm run db:migrate

      - name: Lint
        run: npx eslint "packages/*/src/**/*.ts" "apps/*/src/**/*.ts" "tests/**/*.ts" "scripts/**/*.ts"

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npx vitest run --reporter=verbose 2>&1 | tee test-output.log

      - name: Integration tests
        run: npm run test:integration -- --reporter=verbose 2>&1 | tee integration-test-output.log

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: test-failure-artifacts
          path: |
            **/test-results/
            **/coverage/
            **/*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: test-output
          path: |
            test-output.log
            integration-test-output.log
          retention-days: 7

  macos-build:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build macOS app
        run: |
          set -o pipefail
          xcodebuild build \
            -project apps/macos/ImmoRadar.xcodeproj \
            -scheme ImmoRadar \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50
