version: "3.8"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-env: &app-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  API_BEARER_TOKEN: ${API_BEARER_TOKEN}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  NODE_ENV: ${NODE_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  postgres:
    image: postgres:16-alpine
    # No host ports — only accessible within the Docker network
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    logging: *default-logging
    restart: unless-stopped

  minio:
    image: minio/minio
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    logging: *default-logging
    restart: unless-stopped

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      <<: *app-env
      API_PORT: ${API_PORT:-8080}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    restart: unless-stopped

  worker-scraper:
    build:
      context: ../../
      dockerfile: apps/worker-scraper/Dockerfile
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      <<: *app-env
      SCHEDULER_ENABLED: "true"
    logging: *default-logging
    restart: unless-stopped

  worker-processing:
    build:
      context: ../../
      dockerfile: apps/worker-processing/Dockerfile
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      <<: *app-env
      FEATURE_GEOCODING_ENABLED: "true"
    logging: *default-logging
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
