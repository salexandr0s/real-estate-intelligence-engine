name: RealEstateIntel
options:
  bundleIdPrefix: com.realestateIntel
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.realestateIntel.app
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: true
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  RealEstateIntel:
    type: application
    platform: macOS
    sources:
      - path: RealEstateIntel
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
        INFOPLIST_KEY_CFBundleDisplayName: "Real Estate Intel"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        PRODUCT_NAME: "Real Estate Intel"
    entitlements:
      path: RealEstateIntel/RealEstateIntel.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
