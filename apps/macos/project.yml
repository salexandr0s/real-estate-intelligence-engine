name: ImmoRadar
options:
  bundleIdPrefix: com.immoradar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.immoradar.app
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "97MH8853HX"
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Debug:
      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      ENABLE_HARDENED_RUNTIME: false
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application"
      ENABLE_HARDENED_RUNTIME: true
targets:
  ImmoRadar:
    type: application
    platform: macOS
    sources:
      - path: ImmoRadar
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
        INFOPLIST_KEY_CFBundleDisplayName: "ImmoRadar"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        PRODUCT_NAME: "ImmoRadar"
    preBuildScripts:
      - name: Bundle Local Runtime
        script: |
          if [ "${CONFIGURATION}" != "Release" ]; then
            echo "Skipping bundled runtime for ${CONFIGURATION}"
            exit 0
          fi
          export IMMORADAR_RUNTIME_BUNDLE_STRICT=1
          bash "${SRCROOT}/../../scripts/runtime/build-runtime-bundle.sh" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/runtime"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/runtime/manifest.json
    postBuildScripts:
      - name: Sign Bundled Runtime
        script: |
          if [ "${CONFIGURATION}" != "Release" ]; then
            echo "Skipping bundled runtime signing for ${CONFIGURATION}"
            exit 0
          fi
          if [ "${IMMORADAR_ENABLE_RUNTIME_CODESIGN:-NO}" != "YES" ]; then
            echo "Skipping bundled runtime signing; set IMMORADAR_ENABLE_RUNTIME_CODESIGN=YES for release packaging"
            exit 0
          fi
          bash "${SRCROOT}/../../scripts/runtime/sign-runtime-binaries.sh" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/runtime" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/runtime/.signed-stamp"
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/runtime/manifest.json
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/runtime/.signed-stamp
    dependencies:
      - sdk: MapKit.framework
    entitlements:
      path: ImmoRadar/ImmoRadar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
