name: ImmoRadar
options:
  bundleIdPrefix: com.immoradar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.immoradar.app
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "97MH8853HX"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    ENABLE_HARDENED_RUNTIME: true
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  ImmoRadar:
    type: application
    platform: macOS
    sources:
      - path: ImmoRadar
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
        INFOPLIST_KEY_CFBundleDisplayName: "ImmoRadar"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        PRODUCT_NAME: "ImmoRadar"
    dependencies:
      - sdk: MapKit.framework
    entitlements:
      path: ImmoRadar/ImmoRadar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
